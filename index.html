                                        </button>
                                    </div>

                                    <!-- Section Identification -->
                                    <div class="form-section">
                                        <h6>Identification</h6>
                                        <div class="row g-2">
                                            <div class="col-md-5">
                                                <label class="form-label small">Date <span class="required-mark">*</span></label>
                                                <input type="date" name="date" class="form-control form-control-sm" required value="${Helpers.esc(enl.date)}">
                                            </div>
                                            <div class="col-md-7">
                                                <label class="form-label small">Site producteur <span class="required-mark">*</span></label>
                                                <select name="siteId" class="form-select form-select-sm" required>
                                                    <option value="">-- Choisir --</option>
                                                    ${sites.map(s => `<option value="${s.id}" ${String(enl.siteId) === String(s.id) ? 'selected' : ''}>${Helpers.esc(s.nom)} (${Helpers.esc(s.type)})</option>`).join('')}
                                                </select>
                                            </div>
                                            <div class="col-12">
                                                <label class="form-label small">Type de dechet <span class="required-mark">*</span></label>
                                                <select name="typeDechetId" class="form-select form-select-sm" required>
                                                    <option value="">-- Choisir --</option>
                                                    ${types.map(t => `<option value="${t.id}" data-dang="${t.dangereux ? 1 : 0}" data-low="${Helpers.esc(t.codeLow)}" data-des="${Helpers.esc(t.designation)}" ${String(enl.typeDechetId) === String(t.id) ? 'selected' : ''}>${Helpers.esc(t.codeLow)} - ${Helpers.esc(t.designation)}${t.dangereux ? ' [DANGEREUX]' : ''}</option>`).join('')}
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Section Quantite -->
                                    <div class="form-section">
                                        <h6>Quantite</h6>
                                        <div class="row g-2">
                                            <div class="col-md-5">
                                                <label class="form-label small">Quantite <span class="required-mark">*</span></label>
                                                <input type="number" step="0.001" min="0" name="quantite" class="form-control form-control-sm" required value="${Helpers.esc(enl.quantite)}">
                                            </div>
                                            <div class="col-md-3">
                                                <label class="form-label small">Unite</label>
                                                <select name="unite" class="form-select form-select-sm">
                                                    ${UNITES.map(u => `<option value="${u}" ${enl.unite === u ? 'selected' : ''}>${u}</option>`).join('')}
                                                </select>
                                            </div>
                                            <div class="col-md-4">
                                                <label class="form-label small">Conditionnement</label>
                                                <select name="contenant" class="form-select form-select-sm">
                                                    ${CONTENANTS.map(c => `<option value="${c}" ${enl.contenant === c ? 'selected' : ''}>${c}</option>`).join('')}
                                                </select>
                                            </div>
                                            <div class="col-12">
                                                <label class="form-label small">Photo terrain (1 max)</label>
                                                <input type="file" id="photo-input" class="form-control form-control-sm" accept="image/*" capture="environment">
                                                <div id="photo-preview-zone">
                                                    ${enl.photo ? `<img src="${enl.photo}" class="photo-preview"><button type="button" class="btn btn-sm btn-outline-danger mt-1" id="btn-photo-remove">Retirer la photo</button>` : ''}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Section Tracabilite -->
                                    <div class="form-section">
                                        <h6>Tracabilite reglementaire</h6>
                                        <div class="row g-2">
                                            <div class="col-md-7">
                                                <label class="form-label small">Prestataire</label>
                                                <select name="prestataireId" class="form-select form-select-sm">
                                                    <option value="">-- Choisir --</option>
                                                    ${prestataires.map(p => `<option value="${p.id}" data-nom="${Helpers.esc(p.nom)}" ${String(enl.prestataireId) === String(p.id) ? 'selected' : ''}>${Helpers.esc(p.nom)}</option>`).join('')}
                                                </select>
                                            </div>
                                            <div class="col-md-5" id="bsd-wrap">
                                                <label class="form-label small">N&deg; BSD / Bon d'enlevement <span class="required-mark" id="bsd-star" style="display:none">*</span></label>
                                                <input type="text" name="numeroBsd" class="form-control form-control-sm" value="${Helpers.esc(enl.numeroBsd)}" placeholder="BSD ou bon d'enlevement">
                                            </div>
                                            <div class="col-12">
                                                <small class="text-muted" id="bsd-hint">BSD obligatoire pour les dechets dangereux ; bon d'enlevement pour les dechets banals non dangereux</small>
                                            </div>

                                            <div class="col-md-6">
                                                <label class="form-label small">Mode de traitement (R/D)</label>
                                                <select name="modeTraitement" class="form-select form-select-sm">
                                                    <option value="">-- Non specifie --</option>
                                                    ${MODES_TRAITEMENT.map(m => `<option value="${m.code}" ${enl.modeTraitement === m.code ? 'selected' : ''}>${Helpers.esc(m.label)}</option>`).join('')}
                                                </select>
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label small">Transporteur</label>
                                                <input list="transporteurs-list" type="text" name="transporteurNom" class="form-control form-control-sm" value="${Helpers.esc(enl.transporteurNom)}">
                                                <datalist id="transporteurs-list">${_transpoOpts}</datalist>
                                            </div>
                                            <div class="col-md-8">
                                                <label class="form-label small">Installation de destination</label>
                                                <input list="destinations-list" type="text" name="destinationNom" class="form-control form-control-sm" value="${Helpers.esc(enl.destinationNom)}" placeholder="Centre de traitement">
                                                <datalist id="destinations-list">${_destOpts}</datalist>
                                            </div>
                                            <div class="col-md-4">
                                                <label class="form-label small">SIRET destination</label>
                                                <input type="text" name="destinationSiret" class="form-control form-control-sm" value="${Helpers.esc(enl.destinationSiret)}">
                                            </div>
                                            <div class="col-md-6">
                                                <label class="form-label small">N&deg; facture</label>
                                                <input type="text" name="numeroFacture" class="form-control form-control-sm" value="${Helpers.esc(enl.numeroFacture)}">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card p-3 mt-3">
                            <label class="form-label fw-bold">Observations</label>
                            <textarea name="observations" class="form-control" rows="2">${Helpers.esc(enl.observations)}</textarea>
                        </div>

                        <div class="d-flex gap-2 mt-3 mb-5">
                            <button type="submit" class="btn btn-primary">&#x1F4BE; Enregistrer</button>
                            <a href="#enlevement-list" class="btn btn-outline-secondary">Annuler</a>
                        </div>
                    </form>
                </div>`;

            // Logique dangereux -> BSD obligatoire visuellement
            const typeSelect = container.querySelector('select[name="typeDechetId"]');
            const bsdWrap = container.querySelector('#bsd-wrap');
            const bsdStar = container.querySelector('#bsd-star');
            const bsdInput = container.querySelector('input[name="numeroBsd"]');

            const updateBsdRequired = () => {
                const opt = typeSelect.options[typeSelect.selectedIndex];
                const dang = opt && opt.dataset.dang === '1';
                if (dang) {
                    bsdWrap.classList.add('required-bsd');
                    bsdStar.style.display = '';
                    bsdInput.required = true;
                } else {
                    bsdWrap.classList.remove('required-bsd');
                    bsdStar.style.display = 'none';
                    bsdInput.required = false;
                }
            };
            typeSelect.addEventListener('change', updateBsdRequired);
            updateBsdRequired();

            // Verrouillage des champs reglementaires pour les enlevements importes de Trackdechets
            if (isTd) {
                const lockedNames = [
                    'date', 'siteId', 'typeDechetId', 'quantite', 'unite', 'contenant',
                    'prestataireId', 'numeroBsd', 'modeTraitement',
                    'destinationNom', 'destinationSiret', 'transporteurNom'
                ];
                lockedNames.forEach(n => {
                    const el = container.querySelector(`[name="${n}"]`);
                    if (el) { el.disabled = true; el.classList.add('bg-light'); }
                });
            }

            // Gestion photo
            const photoInput = container.querySelector('#photo-input');
            const previewZone = container.querySelector('#photo-preview-zone');
            let currentPhoto = enl.photo || '';

            photoInput.addEventListener('change', async (ev) => {
                const file = ev.target.files[0];
                if (!file) return;
                try {
                    currentPhoto = await Helpers.compressPhoto(file);
                    previewZone.innerHTML = `<img src="${currentPhoto}" class="photo-preview"><button type="button" class="btn btn-sm btn-outline-danger mt-1" id="btn-photo-remove">Retirer la photo</button>`;
                    previewZone.querySelector('#btn-photo-remove').onclick = () => {
                        currentPhoto = '';
                        previewZone.innerHTML = '';
                        photoInput.value = '';
                    };
                } catch (e) {
                    showToast('Erreur lors du chargement de la photo', 'danger');
                }
            });

            if (previewZone.querySelector('#btn-photo-remove')) {
                previewZone.querySelector('#btn-photo-remove').onclick = () => {
                    currentPhoto = '';
                    previewZone.innerHTML = '';
                    photoInput.value = '';
                };
            }

            // =====================================================
            // Gestion BL (Bon de Livraison) - viewer + upload + drag&drop
            // =====================================================
            let currentBL = enl.bl || null;
            const blViewer       = container.querySelector('#bl-viewer');
            const blInput        = container.querySelector('#bl-input');
            const blFilenameText = container.querySelector('#bl-filename-text');
            const blToolbarActions = container.querySelector('#bl-toolbar-actions');
            const blStorageStatus  = container.querySelector('#bl-storage-status');
            const blPrestBadge   = container.querySelector('#bl-prest-badge');
            const prestSelectEl  = container.querySelector('select[name="prestataireId"]');

            const _normBLName = (s) => String(s || '')
                .normalize('NFD').replace(/[̀-ͯ]/g, '')
                .toLowerCase()
                .replace(/\.[a-z0-9]+$/i, '')
                .replace(/[^a-z0-9]+/g, ' ')
                .trim();

            const renderBLViewer = () => {
                if (!currentBL) {
                    blFilenameText.textContent = 'Aucun BL attache';
                    blToolbarActions.innerHTML = '';
                    blStorageStatus.innerHTML = '&#x1F4C2; Aucun document';
                    blViewer.innerHTML = `
                        <div class="bl-upload-zone" id="bl-upload-zone">
                            <div class="bl-upload-icon">&#x1F4C4;</div>
                            <div style="margin-top:8px; font-weight:600;">Deposer le BL ici</div>
                            <div style="font-size:0.85rem; margin-top:4px;">ou cliquer pour selectionner (PDF, JPG, PNG)</div>
                        </div>`;
                    const zone = blViewer.querySelector('#bl-upload-zone');
                    if (zone) {
                        zone.addEventListener('click', () => blInput.click());
                        zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('bl-drag-over'); });
                        zone.addEventListener('dragleave', () => zone.classList.remove('bl-drag-over'));
                        zone.addEventListener('drop', (e) => {
                            e.preventDefault();
                            zone.classList.remove('bl-drag-over');
                            const f = e.dataTransfer?.files?.[0];
                            if (f) handleBLFile(f);
                        });
                    }
                    return;
                }
                blFilenameText.textContent = currentBL.name || 'BL';
                blToolbarActions.innerHTML = `<button type="button" class="bl-toolbar-btn" id="bl-remove-btn">&#x274C; Retirer</button>`;
                const removeBtn = blToolbarActions.querySelector('#bl-remove-btn');
                if (removeBtn) removeBtn.onclick = () => {
                    currentBL = null;
                    blInput.value = '';
                    if (blPrestBadge) blPrestBadge.style.display = 'none';
                    renderBLViewer();
                };
                if (currentBL.pendingUpload) {
                    blStorageStatus.innerHTML = '<span class="bl-storage-pending">&#x23F3; En attente d\'upload SharePoint</span>';
                } else if (currentBL.sharepointUrl) {
                    blStorageStatus.innerHTML = '<span class="bl-storage-ok">&#x2705; Stocke sur SharePoint</span>';
                } else {
                    blStorageStatus.innerHTML = '&#x1F4C2; Pret a televerser';
                }
                const mime = currentBL.mimeType || '';
                const src = currentBL.base64 || currentBL.sharepointUrl || '';
                if (mime.startsWith('image/')) {
                    blViewer.innerHTML = `<img src="${Helpers.esc(src)}" class="bl-img" alt="BL">`;
                } else if (mime === 'application/pdf') {
                    // Si on a un base64 (data URL), on l'utilise ; sinon sharepointUrl
                    const pdfSrc = currentBL.base64
                        ? currentBL.base64 + '#toolbar=0'
                        : (currentBL.sharepointUrl || '');
                    blViewer.innerHTML = `<iframe src="${Helpers.esc(pdfSrc)}" class="bl-pdf"></iframe>`;
                } else {
                    blViewer.innerHTML = `<div class="bl-mock-empty text-light"><div style="font-size:2rem">&#x1F4C4;</div><div>${Helpers.esc(currentBL.name || 'Fichier')}</div><div class="small text-muted mt-2">Format non previsualisable</div></div>`;
                }
            };

            const _tryDetectPrestataire = (filename) => {
                if (!prestSelectEl) return;
                const norm = _normBLName(filename);
                if (!norm) return;
                let matched = null;
                for (const p of prestataires) {
                    const pnorm = _normBLName(p.nom);
                    if (!pnorm) continue;
                    if (norm.includes(pnorm) || pnorm.includes(norm.split(' ')[0])) {
                        matched = p;
                        break;
                    }
                }
                if (matched) {
                    prestSelectEl.value = String(matched.id);
                    prestSelectEl.dispatchEvent(new Event('change'));
                    if (blPrestBadge) {
                        blPrestBadge.textContent = `${matched.nom} detecte`;
                        blPrestBadge.style.display = '';
                    }
                } else if (blPrestBadge) {
                    blPrestBadge.style.display = 'none';
                }
            };

            const handleBLFile = (file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    currentBL = {
                        name: file.name,
                        mimeType: file.type || 'application/octet-stream',
                        base64: reader.result,
                        sharepointUrl: '',
                        pendingUpload: false
                    };
                    _tryDetectPrestataire(file.name);
                    renderBLViewer();
                };
                reader.onerror = () => showToast('Erreur de lecture du BL', 'danger');
                reader.readAsDataURL(file);
            };

            blInput.addEventListener('change', (e) => {
                const f = e.target.files?.[0];
                if (f) handleBLFile(f);
            });

            // Drag&drop global sur la panel (en plus de la zone si pas de BL)
            const blPanel = container.querySelector('#bl-panel');
            if (blPanel) {
                blPanel.addEventListener('dragover', (e) => { e.preventDefault(); });
                blPanel.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const f = e.dataTransfer?.files?.[0];
                    if (f) handleBLFile(f);
                });
            }

            renderBLViewer();

            // =====================================================
            // Bouton "Dupliquer derniere saisie de [prestataire]"
            // =====================================================
            const btnDuplicateLast = container.querySelector('#btn-duplicate-last');

            const _updateDuplicateBtn = () => {
                if (!btnDuplicateLast || !prestSelectEl) return;
                const opt = prestSelectEl.selectedOptions[0];
                if (!opt || !opt.value) {
                    btnDuplicateLast.style.display = 'none';
                    return;
                }
                const nom = opt.dataset.nom || opt.textContent || 'prestataire';
                btnDuplicateLast.innerHTML = `&#x1F4CB; Dupliquer derniere saisie de ${Helpers.esc(nom)}`;
                btnDuplicateLast.style.display = '';
            };

            if (prestSelectEl) {
                prestSelectEl.addEventListener('change', _updateDuplicateBtn);
                _updateDuplicateBtn();
            }

            if (btnDuplicateLast) {
                btnDuplicateLast.addEventListener('click', async () => {
                    const prestId = prestSelectEl ? Number(prestSelectEl.value) : null;
                    if (!prestId) return;
                    const list = await db.enlevements.where('prestataireId').equals(prestId).reverse().sortBy('date');
                    const last = list && list[0];
                    if (!last) {
                        showToast('Aucune saisie precedente pour ce prestataire', 'info');
                        return;
                    }
                    const fields = ['typeDechetId', 'modeTraitement', 'destinationNom', 'destinationSiret', 'transporteurNom', 'unite', 'contenant'];
                    for (const name of fields) {
                        const el = container.querySelector(`[name="${name}"]`);
                        if (el && last[name] !== undefined && last[name] !== null && last[name] !== '') {
                            el.value = String(last[name]);
                        }
                    }
                    const tSel = container.querySelector('select[name="typeDechetId"]');
                    if (tSel) tSel.dispatchEvent(new Event('change'));
                    showToast('Saisie dupliquee');
                });
            }

            // Submit
            container.querySelector('#enl-form').addEventListener('submit', async (ev) => {
                ev.preventDefault();
                const fd = new FormData(ev.target);
                const typeOpt = typeSelect.options[typeSelect.selectedIndex];
                const siteOpt = container.querySelector('select[name="siteId"]').selectedOptions[0];
                const prestOpt = container.querySelector('select[name="prestataireId"]').selectedOptions[0];

                let data;
                if (isTd) {
                    // Enlevement importe de Trackdechets : on conserve TOUS les champs reglementaires
                    // et on autorise uniquement la modification de observations / photo / n° facture.
                    data = {
                        ...enl,
                        observations:  (fd.get('observations')  || '').trim(),
                        numeroFacture: (fd.get('numeroFacture') || '').trim(),
                        photo:         currentPhoto || ''
                    };
                } else {
                    data = {
                        source: enl.source || 'manuel',
                        date: fd.get('date'),
                        siteId: Number(fd.get('siteId')) || null,
                        siteNom: siteOpt ? siteOpt.textContent.replace(/ \([^)]+\)$/, '') : '',
                        typeDechetId: Number(fd.get('typeDechetId')) || null,
                        typeDechetDesignation: typeOpt ? typeOpt.dataset.des : '',
                        codeLow: typeOpt ? typeOpt.dataset.low : '',
                        dangereux: typeOpt && typeOpt.dataset.dang === '1',
                        quantite: Number(fd.get('quantite')) || 0,
                        unite: fd.get('unite') || 'kg',
                        contenant: fd.get('contenant') || '',
                        prestataireId: Number(fd.get('prestataireId')) || null,
                        prestataireNom: prestOpt && prestOpt.value ? prestOpt.textContent : '',
                        numeroBsd: (fd.get('numeroBsd') || '').trim(),
                        modeTraitement: fd.get('modeTraitement') || '',
                        destinationNom: (fd.get('destinationNom') || '').trim(),
                        destinationSiret: (fd.get('destinationSiret') || '').trim(),
                        transporteurNom: (fd.get('transporteurNom') || '').trim(),
                        numeroFacture: (fd.get('numeroFacture') || '').trim(),
                        observations: (fd.get('observations') || '').trim(),
                        photo: currentPhoto || '',
                        saisiPar: enl.saisiPar || (DataSync.getUserName ? DataSync.getUserName() : '')
                    };
                }

                if (isEdit) data.id = enl.id;

                if (!isTd && data.dangereux && !data.numeroBsd) {
                    showToast('Le numero BSD est obligatoire pour les dechets dangereux', 'warning');
                    return;
                }

                const savedId = await DB.saveEnlevement(data);

                // Upload du BL (si present et non deja stocke) vers SharePoint
                if (currentBL) {
                    let blMeta;
                    const alreadyUploaded = !!(currentBL.sharepointUrl && !currentBL.pendingUpload && (!currentBL.base64 || currentBL.base64 === ''));
                    if (alreadyUploaded) {
                        blMeta = { ...currentBL };
                    } else {
                        try {
                            const annee = (data.date || new Date().toISOString()).slice(0, 4);
                            const prestaSafe = _sanitizeFilenamePart(data.prestataireNom || 'inconnu');
                            const ts = Date.now();
                            const ext = (currentBL.name && currentBL.name.match(/\.[a-z0-9]+$/i)) ? currentBL.name.match(/\.[a-z0-9]+$/i)[0] : '';
                            const baseSafe = _sanitizeFilenamePart((currentBL.name || 'bl').replace(/\.[^.]+$/, ''));
                            const safeName = ts + '_' + baseSafe + ext;
                            const filePath = `${APP_CONFIG.DATA_FOLDER_PATH}/BL/${annee}/${prestaSafe}/${safeName}`;
                            const base64Data = _stripDataUrl(currentBL.base64 || '');
                            const blob = _base64ToBlob(base64Data, currentBL.mimeType);
                            const driveItem = await _uploadBinaryFile(filePath, blob, currentBL.mimeType);
                            blMeta = {
                                name: currentBL.name,
                                mimeType: currentBL.mimeType,
                                base64: '',
                                sharepointUrl: driveItem.webUrl || '',
                                sharepointPath: filePath,
                                uploadedAt: new Date().toISOString(),
                                pendingUpload: false
                            };
                        } catch (uploadErr) {
                            console.warn('Upload BL echoue - conserve en local', uploadErr);
                            blMeta = {
                                name: currentBL.name,
                                mimeType: currentBL.mimeType,
                                base64: currentBL.base64 || '',
                                sharepointUrl: '',
                                pendingUpload: true
                            };
                        }
                    }
                    await DB.saveEnlevement({ ...data, id: savedId, bl: blMeta });
                }

                ActivityLog.log(isEdit ? 'edit_enlevement' : 'new_enlevement', { id: savedId });
                if (typeof DataSync !== 'undefined') DataSync.markDirty();

                showToast(isEdit ? 'Enlevement mis a jour' : 'Enlevement enregistre');

                // Bandeau confirmation post-save
                container.innerHTML = `
                    <div class="container py-4">
                        <div class="alert alert-success">
                            <h4>&#x2705; Enlevement ${isEdit ? 'mis a jour' : 'enregistre'}</h4>
                            <p class="mb-3">Que voulez-vous faire maintenant ?</p>
                            <div class="d-flex gap-2 flex-wrap">
                                <button class="btn btn-primary" id="btn-after-pdf">&#x1F4C4; Voir le PDF</button>
                                <a class="btn btn-success" href="#enlevement-new">&#x2795; Nouvel enlevement</a>
                                <a class="btn btn-outline-secondary" href="#enlevement-list">&#x1F4CB; Voir le registre</a>
                                <a class="btn btn-outline-secondary" href="#dashboard">&#x1F4CA; Tableau de bord</a>
                            </div>
                        </div>
                    </div>`;
                document.getElementById('btn-after-pdf').onclick = () => PdfExport.generate(savedId);
            });
        }
    };
    </script>

    <!-- ============================================================= -->
    <!-- PAGE : CONFIG                                                 -->
    <!-- ============================================================= -->
    <script>
    const ConfigPage = {
        async render(container) {
            container.innerHTML = `
                <div class="container">
                    <h2 class="mb-3">&#x2699;&#xFE0F; Parametres</h2>

                    <ul class="nav nav-tabs mb-3" role="tablist">
                        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-entreprise" type="button">Entreprise</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-types" type="button">Types de dechets</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-prest" type="button">Prestataires</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-sites" type="button">Sites</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-trackdechets" type="button">Trackdechets</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-donnees" type="button">Donnees</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-journal" type="button">Journal</button></li>
                    </ul>

                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="tab-entreprise"><div id="zone-entreprise"></div></div>
                        <div class="tab-pane fade" id="tab-types"><div id="zone-types"></div></div>
                        <div class="tab-pane fade" id="tab-prest"><div id="zone-prest"></div></div>
                        <div class="tab-pane fade" id="tab-sites"><div id="zone-sites"></div></div>
                        <div class="tab-pane fade" id="tab-trackdechets"><div id="zone-trackdechets"></div></div>
                        <div class="tab-pane fade" id="tab-donnees"><div id="zone-donnees"></div></div>
                        <div class="tab-pane fade" id="tab-journal"><div id="zone-journal"></div></div>

    <!-- EXPORT EXCEL                                                  -->
    <!-- ============================================================= -->
    <script>
    const ExcelExport = {
        async registre(enlevementsOverride) {
            const enlevements = enlevementsOverride || await DB.listEnlevements();
            const sites = await DB.listSites();
            const siteMap = Object.fromEntries(sites.map(s => [s.id, s]));

            const rows = enlevements.map(e => ({
                'Date enlevement':       Helpers.formatDateFR(e.date),
                'Code dechet (LoW)':     e.codeLow || '',
                'Designation':           e.typeDechetDesignation || '',
                'Dangereux':             e.dangereux ? 'OUI' : 'non',
                'Quantite':              e.quantite,
                'Unite':                 e.unite || 'kg',
                'Quantite (kg eq.)':     Math.round(tonnesEquiv(e.quantite, e.unite) * 1000),
                'Site producteur':       e.siteNom || '',
                'Adresse site':          siteMap[e.siteId]?.adresse || '',
                'Conditionnement':       e.contenant || '',
                'Mode traitement (R/D)': e.modeTraitement || '',
                "N° BSD / Bon d'enlèvement": e.numeroBsd || '',
                'Transporteur':          e.transporteurNom || '',
                'Installation destination': e.destinationNom || '',
                'SIRET destination':     e.destinationSiret || '',
                'Prestataire':           e.prestataireNom || '',
                'N° facture':            e.numeroFacture || '',
                'Observations':          e.observations || '',
                'Saisi par':             e.saisiPar || ''
            }));

            const ws = XLSX.utils.json_to_sheet(rows);
            ws['!cols'] = [
                {wch:14},{wch:12},{wch:40},{wch:10},{wch:10},{wch:8},{wch:14},
                {wch:22},{wch:30},{wch:14},{wch:20},{wch:18},{wch:22},{wch:28},
                {wch:16},{wch:22},{wch:16},{wch:40},{wch:20}
            ];
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Registre dechets');

            const today = new Date().toISOString().slice(0,10);
            XLSX.writeFile(wb, `Registre_dechets_AGRIWATT_${today}.xlsx`);
            ActivityLog.log('export_excel', { count: enlevements.length });
            showToast('Export Excel genere');
        },

        async import(file) {
            if (!file) return;
            if (!confirm("Importer un fichier Excel ajoute des enlevements (les doublons par N° BSD / Bon d'enlèvement seront ignores). Continuer ?")) return;
            try {
                const buf = await file.arrayBuffer();
                const wb = XLSX.read(buf);
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws);
                if (!rows.length) { showToast('Fichier vide', 'warning'); return; }
                const headers = Object.keys(rows[0]);
                const isPrestataireENRTEC = headers.some(h => /référence|reference/i.test(h))
                    && headers.some(h => /tonnage/i.test(h))
                    && headers.some(h => /date de retrait/i.test(h));
                const mapped = isPrestataireENRTEC
                    ? rows.map(r => this._mapPrestataireENRTEC(r))
                    : rows.map(r => this._mapFormatApp(r));
                // Dedup : index des BSD deja presents en base
                const existing = await DB.listEnlevements();
                const existingBsd = new Set(existing.map(e => (e.numeroBsd||'').trim().toLowerCase()).filter(Boolean));
                let nb = 0, skipped = 0;
                for (const data of mapped) {
                    const bsd = (data.numeroBsd || '').trim();
                    if (bsd && existingBsd.has(bsd.toLowerCase())) { skipped++; continue; }
                    await DB.saveEnlevement(data);
                    if (bsd) existingBsd.add(bsd.toLowerCase());
                    nb++;
                }
                DataSync.markDirty();
                const formatLabel = isPrestataireENRTEC ? ' (format prestataire)' : '';
                const msg = skipped > 0
                    ? `${nb} importe(s)${formatLabel}, ${skipped} doublon(s) ignore(s)`
                    : `${nb} enlevement(s) importe(s)${formatLabel}`;
                showToast(msg);
                App.route();
            } catch (e) {
                console.error(e);
                showToast('Erreur import Excel', 'danger');
            }
        },
        _mapFormatApp(r) {
            return {
                date: r['Date enlevement'] ? this._parseDate(r['Date enlevement']) : Helpers.todayISO(),
                codeLow: r['Code dechet (LoW)'] || '',
                typeDechetDesignation: r['Designation'] || '',
                dangereux: String(r['Dangereux']||'').toUpperCase() === 'OUI',
                quantite: Number(r['Quantite']) || 0,
                unite: r['Unite'] || 'kg',
                siteNom: r['Site producteur'] || '',
                contenant: r['Conditionnement'] || '',
                modeTraitement: r['Mode traitement (R/D)'] || '',
                numeroBsd: String(r["N° BSD / Bon d'enlèvement"] || r['N° BSD'] || '').trim(),
                transporteurNom: r['Transporteur'] || '',
                destinationNom: r['Installation destination'] || '',
                destinationSiret: r['SIRET destination'] || '',
                prestataireNom: r['Prestataire'] || '',
                numeroFacture: r['N° facture'] || '',
                observations: r['Observations'] || '',
                saisiPar: r['Saisi par'] || ''
            };
        },
        _mapPrestataireENRTEC(r) {
            // Recupere les valeurs en tolerant les variantes d'accents/casse sur les en-tetes
            const get = (...names) => {
                for (const n of names) {
                    for (const k of Object.keys(r)) {
                        if (k.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim()
                            === n.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim()) {
                            return r[k];
                        }
                    }
                }
                return '';
            };
            const ref           = String(get('Reference','Référence') || '').trim();
            const codeChantier  = String(get('Code chantier') || '').trim();
            const adresseSite   = String(get('Adresse') || '').trim();
            const typologie     = String(get('Typologie de dechet','Typologie de déchet') || '').trim();
            const prestataire   = String(get('Prestataire') || '').trim();
            const siretRaw      = String(get("Numero d'identification Prestataire","Numéro d'identification Prestataire") || '');
            const siret         = (siretRaw.match(/\d{9,14}/) || [''])[0];
            const adresseExut   = String(get("Adresse de l'exutoire") || '').trim();
            const typeTrait     = String(get('Type de traitement') || '').trim();
            const codeTrait     = String(get('Code de traitement') || '').trim();
            const modeRD        = (codeTrait.match(/^([RD])/i) || [,''])[1].toUpperCase();
            const tonnage       = Number(get('Tonnage')) || 0;
            // Site producteur = code chantier si dispo, sinon commune extraite de l'adresse
            const communeMatch  = adresseSite.match(/\d{5}\s+([^,]+)/);
            const siteNom       = codeChantier || (communeMatch ? communeMatch[1].trim() : 'Site ENRTEC');
            const obsParts = [];
            if (codeChantier && communeMatch) obsParts.push(`Chantier ${codeChantier} - ${communeMatch[1].trim()}`);
            if (adresseSite)  obsParts.push(`Adresse site: ${adresseSite}`);
            if (adresseExut)  obsParts.push(`Exutoire: ${adresseExut}`);
            if (typeTrait)    obsParts.push(`Traitement: ${typeTrait}${codeTrait?` (${codeTrait})`:''}`);
            return {
                date: this._parseDate(get('Date de retrait')),
                codeLow: '',
                typeDechetDesignation: typologie,
                dangereux: /dangereux|dasri|amiante/i.test(typologie),
                quantite: tonnage,
                unite: 't',
                siteNom,
                contenant: '',
                modeTraitement: modeRD,
                numeroBsd: ref,
                transporteurNom: '',
                destinationNom: prestataire,
                destinationSiret: siret,
                prestataireNom: prestataire,
                numeroFacture: '',
                observations: obsParts.join(' | '),
                saisiPar: 'Import prestataire'
            };
        },
        _parseDate(s) {
            if (!s) return Helpers.todayISO();
            if (typeof s === 'number') {
                // Excel date serial
                const d = XLSX.SSF.parse_date_code(s);
                if (d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
            }
            const m = String(s).match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
            if (m) {
                const y = m[3].length === 2 ? '20'+m[3] : m[3];
                return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
            }
            return Helpers.todayISO();
        }
    };
    </script>

    <script>
    const PdfExport = {
        async generate(id) {
            const e = await DB.getEnlevement(id);
            if (!e) { showToast('Enlevement introuvable', 'danger'); return; }

            const entreprise = await DB.getConfig('entreprise') || {};
            const logo = await AppLogo.getBase64();

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
            const pageW = doc.internal.pageSize.getWidth();
            let y = 12;

            // Logo
            if (logo) {
                try { doc.addImage(logo, 'PNG', 12, y, 30, 12); } catch (_) {}
            }

            doc.setFontSize(16);
            doc.setTextColor(0, 105, 62);
            doc.setFont('helvetica', 'bold');
            doc.text(`Enlevement de dechets N° ${e.id}`, pageW / 2, y + 6, { align: 'center' });

            doc.setFontSize(10);
            doc.setTextColor(80);
            doc.setFont('helvetica', 'normal');
            doc.text(`Date : ${Helpers.formatDateFR(e.date)}`, pageW - 12, y + 6, { align: 'right' });

            y += 22;

            // Tableau infos
            const lines = [
                ['Site producteur', e.siteNom || ''],
                ['Code dechet (LoW)', `${e.codeLow || ''}${e.dangereux ? '  [DECHET DANGEREUX]' : ''}`],
                ['Designation', e.typeDechetDesignation || ''],
                ['Quantite', `${e.quantite} ${e.unite || 'kg'}`],
                ['Conditionnement', e.contenant || ''],
                ['Prestataire', e.prestataireNom || ''],
                ["N° BSD / Bon d'enlèvement", e.numeroBsd || ''],
                ['Mode de traitement', e.modeTraitement || ''],
                ['Installation destination', e.destinationNom || ''],
                ['SIRET destination', e.destinationSiret || ''],
                ['Transporteur', e.transporteurNom || ''],
                ['N° facture', e.numeroFacture || ''],
                ['Saisi par', e.saisiPar || '']
            ];

            doc.autoTable({
                startY: y,
                head: [['Champ', 'Valeur']],
                body: lines,
                styles: { fontSize: 10, cellPadding: 2 },
                headStyles: { fillColor: [0, 105, 62], textColor: 255 },
                columnStyles: { 0: { cellWidth: 60, fontStyle: 'bold' }, 1: { cellWidth: pageW - 60 - 24 } },
                margin: { left: 12, right: 12 }
            });

            y = doc.lastAutoTable.finalY + 6;

            if (e.observations) {
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(10);
                doc.text('Observations :', 12, y);
                y += 5;
                doc.setFont('helvetica', 'normal');
                const split = doc.splitTextToSize(e.observations, pageW - 24);
                doc.text(split, 12, y);
                y += split.length * 5 + 4;
            }

            if (e.photo) {
                try {
                    const props = doc.getImageProperties(e.photo);
                    const w = pageW - 24;
                    const h = (props.height * w) / props.width;
                    if (y + h > 270) { doc.addPage(); y = 12; }
                    doc.addImage(e.photo, 'JPEG', 12, y, w, Math.min(h, 150));
                    y += Math.min(h, 150) + 4;
                } catch (_) {}
            }

            // Footer
            doc.setFontSize(8);
            doc.setTextColor(120);
            doc.text(
                'Document de tracabilite interne - Registre chronologique art. R541-43 du Code de l\'environnement',
                pageW / 2, 285, { align: 'center' }
            );
            doc.text(`${entreprise.nom || 'AGRIWATT'} - Genere le ${new Date().toLocaleString('fr-FR')}`,
                pageW / 2, 290, { align: 'center' });

            const filename = `Enlevement_${e.id}_${e.date}_${(e.codeLow||'').replace(/[* ]/g,'')}.pdf`;
            doc.save(filename);
            ActivityLog.log('export_pdf', { id: e.id });
        }
    };
    </script>

    <!-- TRACKDECHETS : API (lecture seule)                            -->
    <!-- ============================================================= -->
    <script>
    /**
     * Module d'acces a l'API GraphQL Trackdechets (https://developers.trackdechets.beta.gouv.fr/).
     * Lecture seule : recupere les BSDD emis par l'etablissement (SIRET) configure et les transforme
     * en enlevements stockes dans IndexedDB.
     */
    const TrackdechetsAPI = {
        _endpoints: {
            production: 'https://api.trackdechets.beta.gouv.fr/',
            sandbox:    'https://api.sandbox.trackdechets.beta.gouv.fr/'
        },

        async query(config, gql, variables = {}) {
            const url = this._endpoints[config.env] || this._endpoints.production;
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${config.token}`,
                    'Content-Type':  'application/json'
                },
                body: JSON.stringify({ query: gql, variables })
            });
            if (!res.ok) {
                const txt = await res.text().catch(() => '');
                throw new Error(`HTTP ${res.status}${txt ? ' : ' + txt.slice(0, 200) : ''}`);
            }
            const json = await res.json();
            if (json.errors) {
                throw new Error(json.errors.map(e => e.message).join(' ; '));
            }
            return json.data;
        },

        async testConnection(config) {
            const data = await this.query(config, `query { me { name email } }`);
            return data.me;
        },

        /**
         * Recupere les BSDD non-brouillons emis par le SIRET configure.
         * Filtre updatedAt > since (si fourni) pour ne pas rapatrier tout l'historique.
         */
        async fetchBsdds(config, since = null) {
            const all = [];
            let cursor = null;
            let hasNextPage = true;
            const QUERY = `
                query($first: Int, $after: ID, $siret: String, $updatedAfter: String) {
                    bsds(
                        first: $first,
                        after: $after,
                        where: {
                            emitter: { company: { siret: { _eq: $siret } } },
                            isDraft: { _eq: false },
                            updatedAt: { _gt: $updatedAfter }
                        }
                    ) {
                        pageInfo { hasNextPage endCursor }
                        edges {
                            node {
                                ... on Bsdd {
                                    id
                                    readableId
                                    status
                                    createdAt
                                    updatedAt
                                    emitter     { company { name siret address } }
                                    recipient   { company { name siret address } }
                                    transporter { company { name siret } }
                                    wasteDetails {
                                        code
                                        name
                                        quantity
                                        quantityType
                                        packagingInfos { type quantity }
                                    }
                                    processingOperationDone
                                    signedAt
                                    sentAt
                                    receivedAt
                                    processedAt
                                }
                            }
                        }
                    }
                }
            `;
            while (hasNextPage) {
                const data = await this.query(config, QUERY, {
                    first: 50,
                    after: cursor,
                    siret: config.siret,
                    updatedAfter: since
                });
                const conn = data && data.bsds;
                if (!conn) break;
                const edges = conn.edges || [];
                for (const e of edges) if (e && e.node) all.push(e.node);
                hasNextPage = conn.pageInfo && conn.pageInfo.hasNextPage;
                cursor      = conn.pageInfo && conn.pageInfo.endCursor;
                if (all.length > 500) break; // garde-fou
            }
            return all;
        },

        /**
         * Convertit un BSDD (objet GraphQL) en enlevement au format suividechets.
         * Cree au passage les referentiels manquants (type de dechet, prestataire, site)
         * pour ne pas casser les listes deroulantes en saisie manuelle.
         */
        async bsdToEnlevement(bsd) {
            // Type de dechet via code LoW
            const codeLow = ((bsd.wasteDetails && bsd.wasteDetails.code) || '').trim();
            let typeDechet = null;
            if (codeLow) {
                typeDechet = await db.types_dechets.where('codeLow').equals(codeLow).first();
                if (!typeDechet) {
                    const id = await db.types_dechets.add({
                        codeLow,
                        designation: (bsd.wasteDetails && bsd.wasteDetails.name) || codeLow,
                        dangereux:   codeLow.includes('*')
                    });
                    typeDechet = await db.types_dechets.get(id);
                }
            }

            // Prestataire = transporteur (collecte)
            const transNom   = (bsd.transporter && bsd.transporter.company && bsd.transporter.company.name)  || '';
            const transSiret = (bsd.transporter && bsd.transporter.company && bsd.transporter.company.siret) || '';
            let prestataire  = null;
            if (transNom) {
                prestataire = await db.prestataires.where('nom').equals(transNom).first();
                if (!prestataire) {
                    const id = await db.prestataires.add({
                        nom:       transNom,
                        siret:     transSiret,
                        email:     '',
                        telephone: ''
                    });
                    prestataire = await db.prestataires.get(id);
                }
            }

            // Site producteur
            const siteName = (bsd.emitter && bsd.emitter.company && bsd.emitter.company.name) || '';
            let site = null;
            if (siteName) {
                site = await db.sites.where('nom').equals(siteName).first();
                if (!site) {
                    const id = await db.sites.add({
                        nom:     siteName,
                        adresse: (bsd.emitter && bsd.emitter.company && bsd.emitter.company.address) || '',
                        type:    'agence'
                    });
                    site = await db.sites.get(id);
                }
            }

            const dateIso = String(bsd.receivedAt || bsd.signedAt || bsd.sentAt || bsd.createdAt || '').slice(0, 10)
                || Helpers.todayISO();

            // Quantite (Trackdechets renvoie en tonnes)
            const qty = (bsd.wasteDetails && Number(bsd.wasteDetails.quantity)) || 0;

            // Conditionnement (premier packaging)
            const firstPack    = bsd.wasteDetails && bsd.wasteDetails.packagingInfos && bsd.wasteDetails.packagingInfos[0];
            const contenantMap = { BENNE: 'benne', GRV: 'GRV', FUT: 'fut', BIGBAG: 'bigbag', PALETTE: 'palette' };
            const contenant    = firstPack ? (contenantMap[firstPack.type] || 'autre') : 'autre';

            return {
                source:                 'trackdechets',
                trackdechetsId:         bsd.id,
                trackdechetsReadableId: bsd.readableId || '',
                trackdechetsStatus:     bsd.status || '',
                trackdechetsRaw:        bsd,
                date:                   dateIso,
                siteId:                 (site && site.id) || null,
                siteNom:                siteName,
                typeDechetId:           (typeDechet && typeDechet.id) || null,
                typeDechetDesignation:  (typeDechet && typeDechet.designation) || (bsd.wasteDetails && bsd.wasteDetails.name) || '',
                codeLow,
                dangereux:              codeLow.includes('*'),
                quantite:               qty,
                unite:                  't',
                contenant,
                prestataireId:          (prestataire && prestataire.id) || null,
                prestataireNom:         transNom,
                numeroBsd:              bsd.readableId || '',
                modeTraitement:         bsd.processingOperationDone || '',
                destinationNom:         (bsd.recipient && bsd.recipient.company && bsd.recipient.company.name)  || '',
                destinationSiret:       (bsd.recipient && bsd.recipient.company && bsd.recipient.company.siret) || '',
                transporteurNom:        transNom,
                observations:           '',
                photo:                  null,
                numeroFacture:          '',
                saisiPar:               'Trackdechets',
                createdAt:              bsd.createdAt || new Date().toISOString(),
                updatedAt:              bsd.updatedAt || new Date().toISOString()
            };
        }
    };
    </script>

    <!-- TRACKDECHETS : orchestrateur de synchronisation               -->
    <!-- ============================================================= -->
    <script>
    const TrackdechetsSync = {
        _timer: null,

        async runOnce() {
            const cfg = await DB.getConfig('trackdechets_config');
            if (!cfg || !cfg.enabled || !cfg.token || !cfg.siret) {
                return { imported: 0, skipped: 0, errors: 0 };
            }
            const since = cfg.lastSyncAt || null;
            let imported = 0, skipped = 0;
            try {
                const bsds = await TrackdechetsAPI.fetchBsdds(cfg, since);
                for (const bsd of bsds) {
                    const existing = bsd.id
                        ? await db.enlevements.where('trackdechetsId').equals(bsd.id).first()
                        : null;
                    const enlData = await TrackdechetsAPI.bsdToEnlevement(bsd);
                    if (existing) {
                        // Conserve les ajouts locaux (observations, photo, n° facture) qui n'existent pas sur Trackdechets
                        enlData.id            = existing.id;
                        enlData.observations  = existing.observations  || '';
                        enlData.photo         = existing.photo         || null;
                        enlData.numeroFacture = existing.numeroFacture || '';
                        await db.enlevements.put(enlData);
                        skipped++;
                    } else {
                        await db.enlevements.add(enlData);
                        imported++;
                    }
                }
                const newCfg = {
                    ...cfg,
                    lastSyncAt:       new Date().toISOString(),
                    lastSyncStatus:   'success',
                    lastErrorMessage: '',
                    totalImported:    (cfg.totalImported || 0) + imported
                };
                await DB.setConfig('trackdechets_config', newCfg);
                if (typeof DataSync !== 'undefined' && DataSync.markDirty) DataSync.markDirty();
                ActivityLog.log('trackdechets_sync', { imported, skipped });
                return { imported, skipped, errors: 0 };
            } catch (e) {
                // Ne JAMAIS logger token/siret en console
                console.warn('Trackdechets sync : echec');
                const newCfg = {
                    ...cfg,
                    lastSyncStatus:   'error',
                    lastErrorMessage: e.message || String(e)
                };
                await DB.setConfig('trackdechets_config', newCfg);
                return { imported: 0, skipped: 0, errors: 1, error: e };
            }
        },

        startAutoSync() {
            if (this._timer) clearInterval(this._timer);
            DB.getConfig('trackdechets_config').then(cfg => {
                if (!cfg || !cfg.enabled) return;
                const intervalMin = Math.min(1440, Math.max(5, cfg.pollIntervalMin || 60));
                const intervalMs  = intervalMin * 60 * 1000;
                this._timer = setInterval(() => this.runOnce().catch(() => {}), intervalMs);
                // Premier run differe de 30 s pour ne pas bloquer le demarrage
                setTimeout(() => this.runOnce().catch(() => {}), 30000);
            }).catch(() => {});
        },

        stopAutoSync() {
            if (this._timer) clearInterval(this._timer);
            this._timer = null;
        }
    };
    </script>

    <script>
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const id = 'toast-' + Date.now();
        container.insertAdjacentHTML('beforeend', `
            <div id="${id}" class="toast align-items-center text-bg-${type}" role="alert" aria-live="assertive">
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>`);
        const toastEl = document.getElementById(id);
        const toast = new bootstrap.Toast(toastEl, { delay: 3500 });
        toast.show();
        toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
    }

    const App = {
        pages: {
            'dashboard':        DashboardPage,
            'enlevement-list':  EnlevementListPage,
            'enlevement-new':   EnlevementFormPage,
            'enlevement-edit':  EnlevementFormPage,
            'config':           ConfigPage
        },

        init() {
            window.addEventListener('hashchange', () => this.route());

            const navCollapse = document.getElementById('navbarNav');
            document.querySelectorAll('[data-page]').forEach(link => {
                link.addEventListener('click', e => {
                    e.preventDefault();
                    location.hash = '#' + link.dataset.page;
                    if (navCollapse && navCollapse.classList.contains('show')) {
                        bootstrap.Collapse.getInstance(navCollapse)?.hide();
                    }
                });
            });

            if (!location.hash || location.hash === '#') location.hash = '#dashboard';
            this.route();
        },

        async route() {
            const hash   = location.hash.slice(1) || 'dashboard';
            const parts  = hash.split('/');
            const page   = parts[0];
            const params = parts.slice(1);

            if (typeof DataSync !== 'undefined' && DataSync._applyPendingIfAny) {
                await DataSync._applyPendingIfAny();
            }

            const pageModule = this.pages[page];
            const container  = document.getElementById('app-content');

            if (pageModule) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Chargement...</span>
                        </div>
                    </div>`;
                try {
                    await pageModule.render(container, ...params);
                } catch (err) {
                    console.error('Erreur page:', err);
                    container.innerHTML = `
                        <div class="alert alert-danger m-3">
                            ⚠️ Erreur lors du chargement de la page : ${err.message}
                        </div>`;
                }
            } else {
                container.innerHTML = `
                    <div class="alert alert-warning m-3">
                        ❓ Page introuvable. <a href="#dashboard">Retour au tableau de bord</a>
                    </div>`;
            }

            DataSync._refreshReminder();

            document.querySelectorAll('.navbar-nav [data-page]').forEach(link => {
                link.classList.toggle('active', link.dataset.page === page);
            });
            document.querySelectorAll('.bottom-nav-item[data-page]').forEach(item => {
                item.classList.toggle('active', item.dataset.page === page);
            });
            window.scrollTo(0, 0);
        },

        async _initSyncUI() {
            const navContainer = document.querySelector('.navbar .container-fluid');
            if (!navContainer) return;
            const toggler = navContainer.querySelector('.navbar-toggler');
            const syncDiv = document.createElement('div');
            syncDiv.className = 'd-flex align-items-center gap-1 ms-auto me-2 order-lg-last me-lg-0';
            syncDiv.id = 'sync-buttons';
            syncDiv.innerHTML = `
                <button class="btn btn-outline-light btn-sm" id="btn-connect-folder" title="Connecter SharePoint">
                    \u{1F517}<span class="ms-1">Connecter</span>
                </button>
                <button class="btn btn-outline-light btn-sm" id="btn-save-data" title="Sauvegarder" style="display:none">
                    \u{1F4BE}<span class="ms-1">Sauvegarder</span>
                    <span class="badge bg-danger d-none" id="sync-badge">!</span>
                </button>`;
            if (toggler) navContainer.insertBefore(syncDiv, toggler);
            else navContainer.appendChild(syncDiv);

            document.getElementById('btn-save-data').onclick = () => DataSync.save();

            const state = await DataSync.autoConnect();
            DataSync.updateConnectButton(state);

            if (state === 'connected') {
                App.route();
                const others = await DataSync.getActiveUsers();
                DataSync._updatePresenceBanner(others);
            } else {
                DataSync.showConnectReminder();
            }
        }
    };

    /* ---------- Demarrage ---------- */
    document.addEventListener('DOMContentLoaded', () => {
        db.open()
            .then(async () => {
                await ensureSeed();
            })
            .then(async () => {
                if (window._appLoaded) window._appLoaded();
                App.init();
                await App._initSyncUI();
                DataSync.setupBeforeUnload();
                DataSync.startPolling();
                if (!DataSync._loadedSnapshot) await DataSync._captureSnapshot();
                // Demarrage de la synchronisation Trackdechets (no-op si desactivee)
                try { TrackdechetsSync.startAutoSync(); } catch (_) {}
            })
            .catch(err => {
                console.error('DB error:', err);
                document.getElementById('app-content').innerHTML = `
                    <div class="alert alert-danger m-3">
                        ⚠️ Erreur de base de donnees : ${err.message}
                    </div>`;
            });
    });
    </script>

    <!-- ============================================================= -->
    <!-- PWA : Service Worker                                          -->
    <!-- ============================================================= -->
    <script>
    window.APP_BUILD = '2026-05-19-td';
    console.log('Suivi Dechets Build:', window.APP_BUILD);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW enregistre:', reg.scope))
            .catch(err => console.warn('SW erreur:', err));
    }

    document.addEventListener('DOMContentLoaded', () => {
        const v = document.createElement('div');
        v.style.cssText = 'position:fixed;bottom:2px;right:5px;font-size:10px;color:#aaa;z-index:1;pointer-events:none;';
        v.textContent = 'PWA ' + window.APP_BUILD;
        document.body.appendChild(v);
    });
    </script>
</body>
