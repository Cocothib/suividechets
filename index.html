<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00693e">
    <title>Suivi Dechets - AGRIWATT</title>
    <link rel="manifest" href="manifest.json">

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --agw-green: #00693e;
            --agw-green-dark: #004d2d;
            --agw-green-light: #2a9d6c;
            --agw-bg: #f8f9fa;
        }

        body {
            background: var(--agw-bg);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding-bottom: 90px; /* espace pour la bottom nav */
        }

        .bg-primary { background-color: var(--agw-green) !important; }
        .btn-primary { background-color: var(--agw-green); border-color: var(--agw-green); }
        .btn-primary:hover { background-color: var(--agw-green-dark); border-color: var(--agw-green-dark); }
        .text-primary { color: var(--agw-green) !important; }
        .border-primary { border-color: var(--agw-green) !important; }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
        }

        .card-header {
            background: var(--agw-green);
            color: #fff;
            font-weight: 600;
            border-top-left-radius: 12px !important;
            border-top-right-radius: 12px !important;
        }

        .kpi-card {
            border-left: 4px solid var(--agw-green);
            padding: 14px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,.05);
        }

        .kpi-card .kpi-value {
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--agw-green);
            line-height: 1;
        }

        .kpi-card .kpi-label {
            font-size: 0.85rem;
            color: #666;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .badge-danger-dechet {
            background: #dc3545;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 8px;
        }

        .badge-low {
            font-family: 'Courier New', monospace;
            background: #e9ecef;
            color: #333;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .badge-trackdechets {
            display: inline-block;
            background: var(--agw-green);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 6px;
            margin-left: 4px;
            letter-spacing: 0.4px;
            vertical-align: middle;
        }

        .badge-traitement {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 6px;
            margin-left: 4px;
            letter-spacing: 0.3px;
            vertical-align: middle;
            font-family: 'Courier New', monospace;
        }
        .badge-traitement.badge-trait-r { background: #198754; color: #fff; }
        .badge-traitement.badge-trait-d { background: #6c757d; color: #fff; }

        .destination-line {
            font-size: 0.78rem;
            color: #6c757d;
            margin-top: 2px;
            line-height: 1.2;
        }
        .destination-line::before {
            content: '↳ ';
            color: #adb5bd;
        }

        .table thead th {
            background: var(--agw-green);
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border: none;
        }

        .table tbody tr:hover { background: #f0f7f3; }

        .form-section-title {
            color: var(--agw-green);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 2px solid var(--agw-green);
            padding-bottom: 6px;
            margin-bottom: 14px;
        }

        .required-bsd input.form-control {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 0.15rem rgba(220, 53, 69, .15);
        }

        .required-mark { color: #dc3545; font-weight: 700; }

        /* Mobile bottom nav (identique a suivivmc) */
        .mobile-bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #ddd;
            z-index: 1000;
            padding: 6px 0;
            justify-content: space-around;
            box-shadow: 0 -2px 8px rgba(0,0,0,.08);
        }

        .bottom-nav-item {
            flex: 1;
            text-align: center;
            color: #6c757d;
            text-decoration: none;
            font-size: 0.7rem;
            padding: 4px 2px;
        }

        .bottom-nav-item.active { color: var(--agw-green); font-weight: 600; }
        .bottom-nav-icon { font-size: 1.2rem; display: block; }

        .bottom-nav-fab .bottom-nav-fab-btn {
            display: inline-flex;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--agw-green);
            color: #fff;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 700;
            margin: -16px auto 2px;
            box-shadow: 0 3px 8px rgba(0,105,62,.4);
        }

        @media (max-width: 992px) {
            .mobile-bottom-nav { display: flex; }
            body { padding-bottom: 80px; }
        }

        .navbar-brand-logo {
            width: 32px;
            height: 32px;
            margin-right: 8px;
            background: #fff;
            border-radius: 6px;
            padding: 4px;
            object-fit: contain;
        }

        /* Tabs config */
        .nav-tabs .nav-link.active {
            background: var(--agw-green);
            color: #fff;
            border-color: var(--agw-green);
        }
        .nav-tabs .nav-link { color: var(--agw-green); }

        /* Photo preview */
        .photo-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            border: 2px solid #ddd;
            margin-top: 8px;
        }

        /* Filtres */
        .filter-bar {
            background: #fff;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,.05);
        }

        /* Loading */
        .spinner-border { color: var(--agw-green); }

        /* Print PDF helpers */
        @media print { .no-print { display: none !important; } }

        /* ====== Module Bon de Livraison (BL) ====== */
        .bl-viewer-panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 480px;
        }
        .bl-toolbar {
            background: var(--agw-green);
            color: #fff;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .bl-toolbar .bl-filename {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
            font-weight: 600;
        }
        .bl-toolbar .bl-toolbar-actions { display: flex; gap: 4px; }
        .bl-toolbar .bl-toolbar-btn {
            background: rgba(255,255,255,0.15);
            border: none; color: #fff;
            padding: 4px 10px; border-radius: 4px; font-size: 0.85rem;
            cursor: pointer;
        }
        .bl-toolbar .bl-toolbar-btn:hover { background: rgba(255,255,255,0.3); }
        .bl-viewer {
            flex: 1;
            background: #2b2b2b;
            min-height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: auto;
        }
        .bl-viewer img.bl-img { max-width: 100%; max-height: 70vh; display: block; }
        .bl-viewer iframe.bl-pdf {
            width: 100%; height: 70vh; min-height: 480px;
            border: 0; background: #fff;
        }
        .bl-upload-zone {
            border: 2px dashed #c7d2e0;
            border-radius: 10px;
            padding: 32px 18px;
            text-align: center;
            cursor: pointer;
            background: #fafbfc;
            color: #6b7280;
            transition: 0.15s;
            width: 90%;
            max-width: 420px;
        }
        .bl-upload-zone:hover,
        .bl-upload-zone.bl-drag-over {
            background: #eef7f0;
            border-color: var(--agw-green);
            color: var(--agw-green);
        }
        .bl-upload-zone .bl-upload-icon { font-size: 2.4rem; color: var(--agw-green); }
        .bl-mock-empty { text-align: center; padding: 18px; }
        .bl-footer {
            background: #fff;
            border-top: 1px solid #e5e7eb;
            padding: 8px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #6b7280;
        }
        .bl-footer .bl-storage-ok { color: var(--agw-green); font-weight: 600; }
        .bl-footer .bl-storage-pending { color: #b58105; font-weight: 600; }
        .bl-form-panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            padding: 16px;
        }
        .bl-form-panel .form-section {
            border-left: 3px solid var(--agw-green);
            padding-left: 12px;
            margin-bottom: 16px;
        }
        .bl-form-panel .form-section h6 {
            color: var(--agw-green);
            font-weight: 700;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .badge-prestataire-detected {
            background: #e8f4ea;
            color: var(--agw-green-dark);
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
        .btn-duplicate-last {
            font-size: 0.78rem;
        }
        @media (max-width: 991.98px) {
            .bl-viewer-panel { min-height: 320px; }
            .bl-viewer { min-height: 280px; }
            .bl-viewer iframe.bl-pdf { height: 50vh; min-height: 320px; }
        }
    </style>
</head>

    <!-- Mobile bottom navigation -->
    <nav class="mobile-bottom-nav" id="mobile-nav">
        <a href="#dashboard" class="bottom-nav-item" data-page="dashboard">

        <a href="#enlevement-list" class="bottom-nav-item" data-page="enlevement-list">

            <span class="bottom-nav-label">Registre</span>
        </a>
        <a href="#enlevement-new" class="bottom-nav-item bottom-nav-fab" data-page="enlevement-new">

    </nav>

    <!-- Toast container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container" style="z-index:2000"></div>

    <!-- Diagnostic timeout -->
    <script>
    (function() {
        var timer = setTimeout(function() {
            var el = document.getElementById('loading-screen');
            if (!el) return;
            el.innerHTML =
                '<div class="alert alert-danger text-start mx-auto" style="max-width:500px">' +
                '<h5>&#x26A0;&#xFE0F; Erreur de chargement</h5>' +
                '<p>L\'application n\'a pas pu demarrer correctement.</p>' +
                '<p class="small text-muted">Essayez de recharger la page (Ctrl+F5).</p>' +
                '</div>';
        }, 10000);
        window._appLoaded = function() { clearTimeout(timer); };
    })();
    </script>

    <script>
    const db = new Dexie('SuiviDechets');

    db.version(1).stores({
        enlevements:   '++id, date, siteId, typeDechetId, prestataireId, numeroBsd',
        types_dechets: '++id, codeLow, designation, dangereux',
        prestataires:  '++id, nom, siret',
        sites:         '++id, nom, type',
        utilisateurs:  'id, nom, agence',
        config:        'id'
    });

    // v2 : ajout de l'integration Trackdechets (lecture seule) - migration non destructive
    db.version(2).stores({
        enlevements:   '++id, date, siteId, typeDechetId, prestataireId, numeroBsd, source, trackdechetsId',
        types_dechets: '++id, codeLow, designation, dangereux',
        prestataires:  '++id, nom, siret',
        sites:         '++id, nom, type',
        utilisateurs:  'id, nom, agence',
        config:        'id'
    }).upgrade(tx => {
        // Marque tous les enlevements existants comme "manuel" (defaut)
        return tx.table('enlevements').toCollection().modify(e => {
            if (!e.source) e.source = 'manuel';
        });
    });

    // v3 : ajout du Bon de Livraison (BL) prestataire en piece jointe sur les enlevements
    // Le champ bl est un objet { name, mimeType, base64, sharepointUrl, uploadedAt, pendingUpload }
    // Pas de nouvel index : le BL est consulte via l'enlevement parent.

    const SEED_PRESTATAIRES = [

    const SEED_SITES = [

        { id: 3, nom: 'Bouxieres-sous-Froidmont', adresse: '', type: 'agence' },

    async function ensureSeed() {
        if ((await db.types_dechets.count()) === 0) {
            await db.types_dechets.bulkPut(SEED_TYPES_DECHETS);
            console.log('Seed: types de dechets charges');

        if ((await db.prestataires.count()) === 0) {

        // Enlevements
        async getEnlevement(id) { return db.enlevements.get(Number(id)); },
        async listEnlevements() { return db.enlevements.orderBy('date').reverse().toArray(); },

            const wasNew = !data.id;
            data.updatedAt = now;
            if (wasNew) data.createdAt = now;
            const id = await db.enlevements.put(data);

    <!-- SYNC SHAREPOINT (MSAL + Graph API)                            -->
    <!-- ============================================================= -->
    <script>
    let _msalInstance = null;
    let _msalAccount  = null;

    const _isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile/i.test(navigator.userAgent)
        || (navigator.maxTouchPoints > 1 && /Mac/.test(navigator.userAgent));

    async function _initMSAL() {
        if (_msalInstance) return _msalInstance;
        const config = {
            auth: {
                clientId:    APP_CONFIG.CLIENT_ID,
                authority:   `https://login.microsoftonline.com/${APP_CONFIG.TENANT_ID}`,
                redirectUri: APP_CONFIG.REDIRECT_URI
            },
            cache: {
                cacheLocation: 'localStorage',
                storeAuthStateInCookie: true
            }
        };
        _msalInstance = new msal.PublicClientApplication(config);
        await _msalInstance.initialize();

        const resp = await _msalInstance.handleRedirectPromise();
        if (resp) {
            _msalAccount = resp.account;
            _msalInstance._fromRedirect = true;
        } else {
            const accounts = _msalInstance.getAllAccounts();
            if (accounts.length > 0) _msalAccount = accounts[0];
        }
        return _msalInstance;
    }

    async function _getToken() {
        if (!_msalInstance) await _initMSAL();
        if (!_msalAccount) return null;
        try {
            const resp = await _msalInstance.acquireTokenSilent({
                scopes: APP_CONFIG.SCOPES,
                account: _msalAccount
            });
            return resp.accessToken;
        } catch (e) {
            if (e instanceof msal.InteractionRequiredAuthError) {
                if (_isMobile) {
                    await _msalInstance.acquireTokenRedirect({ scopes: APP_CONFIG.SCOPES });
                    return null;
                }
                const resp = await _msalInstance.acquireTokenPopup({ scopes: APP_CONFIG.SCOPES });
                _msalAccount = resp.account;
                return resp.accessToken;
            }
            console.error('MSAL token error:', e);
            return null;
        }
    }

    async function _graphFetch(url, options = {}) {
        const token = await _getToken();
        if (!token) throw new Error('Non authentifie');
        const headers = { 'Authorization': `Bearer ${token}`, ...(options.headers || {}) };
        return fetch(url, { ...options, headers });
    }

    function _siteApiBase() {
        return `https://graph.microsoft.com/v1.0/sites/root:${APP_CONFIG.SHAREPOINT_SITE_PATH}:`;
    }

    let _cachedDriveId = null;
    async function _getDriveId() {
        if (_cachedDriveId) return _cachedDriveId;
        const resp = await _graphFetch(`${_siteApiBase()}/drive`);
        if (!resp.ok) throw new Error('Impossible de trouver le drive SharePoint: ' + resp.status);
        const data = await resp.json();
        _cachedDriveId = data.id;
        return _cachedDriveId;
    }

    async function _readJsonFile(filePath) {
        const driveId = await _getDriveId();
        const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${filePath}:/content`;
        const resp = await _graphFetch(url);
        if (resp.status === 404) return null;
        if (!resp.ok) {
            const err = new Error('Erreur lecture fichier: ' + resp.status);
            err.status = resp.status;
            throw err;
        }
        return resp.json();
    }

    async function _readJsonFileWithETag(filePath) {
        const driveId = await _getDriveId();
        const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${filePath}:/content`;
        const resp = await _graphFetch(url);
        if (resp.status === 404) return { data: null, eTag: null };
        if (!resp.ok) {
            const err = new Error('Erreur lecture fichier: ' + resp.status);
            err.status = resp.status;
            throw err;
        }
        const eTag = resp.headers.get('ETag') || resp.headers.get('etag') || null;
        const data = await resp.json();
        return { data, eTag };
    }

    async function _writeJsonFile(filePath, data, opts = {}) {
        const driveId = await _getDriveId();
        const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${filePath}:/content`;
        const headers = { 'Content-Type': 'application/json' };
        if (opts.ifMatch)     headers['If-Match']      = opts.ifMatch;
        if (opts.ifNoneMatch) headers['If-None-Match'] = opts.ifNoneMatch;
        const resp = await _graphFetch(url, {
            method: 'PUT',
            headers,
            body: JSON.stringify(data)
        });
        if (resp.status === 412) {
            const err = new Error('Conflit de version');
            err.status = 412;
            err.isPreconditionFailed = true;
            throw err;
        }
        if (!resp.ok) throw new Error('Erreur ecriture fichier: ' + resp.status);
        return resp.json();
    }

    async function _deleteFile(filePath) {
        const driveId = await _getDriveId();
        const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${filePath}`;
        await _graphFetch(url, { method: 'DELETE' });
    }

    /* Upload binaire (PDF, image, etc.) vers SharePoint - retourne le driveItem (webUrl) */
    async function _uploadBinaryFile(filePath, blob, contentType) {
        const driveId = await _getDriveId();
        const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${filePath}:/content`;
        const token = await _getToken();
        if (!token) throw new Error('Non authentifie');
        const headers = {
            'Authorization': `Bearer ${token}`,
            'Content-Type': contentType || 'application/octet-stream'
        };
        const resp = await fetch(url, { method: 'PUT', headers, body: blob });
        if (!resp.ok) throw new Error('Erreur upload BL: ' + resp.status);
        return resp.json();
    }

    /* Sanitise un segment de chemin (nom prestataire, etc.) : sans accents, alphanum + _ */
    function _sanitizeFilenamePart(s) {
        if (!s) return 'inconnu';
        return String(s)
            .normalize('NFD').replace(/[̀-ͯ]/g, '')
            .replace(/[^a-zA-Z0-9]+/g, '_')
            .replace(/^_+|_+$/g, '')
            .substring(0, 80) || 'inconnu';
    }

    /* Convertit base64 (sans prefixe data:) en Blob */
    function _base64ToBlob(b64, contentType) {
        const byteChars = atob(b64);
        const byteNums = new Array(byteChars.length);
        for (let i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
        return new Blob([new Uint8Array(byteNums)], { type: contentType || 'application/octet-stream' });
    }

    /* Extrait la partie base64 pure d'une dataURL ou base64 brut */
    function _stripDataUrl(s) {
        if (!s) return '';
        const idx = s.indexOf('base64,');
        return idx >= 0 ? s.substring(idx + 7) : s;
    }

    async function _listFiles(folderPath) {
        const driveId = await _getDriveId();
        const url = `https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${folderPath}:/children`;
        const resp = await _graphFetch(url);
        if (resp.status === 404) return [];
        if (!resp.ok) return [];
        const data = await resp.json();
        return data.value || [];
    }

    /* ==============================================================
       DataSync - synchronisation avec SharePoint
       ============================================================== */
    const DataSync = {
        _connected: false,
        _dirty: false,
        _saveTimer: null,
        _saving: false,
        _loadedMeta: null,
        _lastSavedAt: null,
        _pollTimer: null,
        _presenceTimer: null,
        _pendingRemoteData: null,
        _pendingNotified: false,
        _loadedSnapshot: null,

        get _dirHandle() { return this._connected ? true : null; },

        getUserName() {
            if (_msalAccount && _msalAccount.name) return _msalAccount.name;
            return localStorage.getItem('dechets_user_name') || '';
        },
        setUserName(name) {
            localStorage.setItem('dechets_user_name', (name || '').trim());
        },

        async _collectData() {
            const enlevements   = await db.enlevements.toArray();
            const types_dechets = await db.types_dechets.toArray();
            const prestataires  = await db.prestataires.toArray();
            const sites         = await db.sites.toArray();
            const utilisateurs  = await db.utilisateurs.toArray();
            const config        = await db.config.toArray();
            const version       = (this._loadedMeta?.version || 0) + 1;
            return {
                _meta: {
                    version,
                    lastSaved: new Date().toISOString(),
                    savedBy: this.getUserName() || 'inconnu'
                },
                enlevements, types_dechets, prestataires, sites, utilisateurs, config
            };
        },

        async _applyRemoteData(data) {
            if (!data) return;
            this._loadedMeta = data._meta || null;
            this._lastSavedAt = data._meta?.lastSaved || null;

            await db.transaction('rw', db.enlevements, db.types_dechets, db.prestataires, db.sites, db.utilisateurs, db.config, async () => {
                await db.enlevements.clear();
                await db.types_dechets.clear();
                await db.prestataires.clear();
                await db.sites.clear();
                await db.utilisateurs.clear();
                await db.config.clear();
                if (data.enlevements?.length)   await db.enlevements.bulkPut(data.enlevements);
                if (data.types_dechets?.length) await db.types_dechets.bulkPut(data.types_dechets);
                if (data.prestataires?.length)  await db.prestataires.bulkPut(data.prestataires);
                if (data.sites?.length)         await db.sites.bulkPut(data.sites);
                if (data.utilisateurs?.length)  await db.utilisateurs.bulkPut(data.utilisateurs);
                if (data.config?.length)        await db.config.bulkPut(data.config);
            });

            this._dirty = false;
            this._updateBadge(false);
            await this._captureSnapshot();
        },

        async _captureSnapshot() {
            try {
                const raw = {
                    enlevements:   await db.enlevements.toArray(),
                    types_dechets: await db.types_dechets.toArray(),
                    prestataires:  await db.prestataires.toArray(),
                    sites:         await db.sites.toArray(),
                    utilisateurs:  await db.utilisateurs.toArray(),
                    config:        await db.config.toArray()
                };
                this._loadedSnapshot = JSON.stringify(raw);
            } catch (e) {
                this._loadedSnapshot = null;
            }
        },

        async _writeLocalData(data) {
            await db.transaction('rw', db.enlevements, db.types_dechets, db.prestataires, db.sites, db.utilisateurs, db.config, async () => {
                await db.enlevements.clear();
                await db.types_dechets.clear();
                await db.prestataires.clear();
                await db.sites.clear();
                await db.utilisateurs.clear();
                await db.config.clear();
                if (data.enlevements?.length)   await db.enlevements.bulkPut(data.enlevements);
                if (data.types_dechets?.length) await db.types_dechets.bulkPut(data.types_dechets);
                if (data.prestataires?.length)  await db.prestataires.bulkPut(data.prestataires);
                if (data.sites?.length)         await db.sites.bulkPut(data.sites);
                if (data.utilisateurs?.length)  await db.utilisateurs.bulkPut(data.utilisateurs);
                if (data.config?.length)        await db.config.bulkPut(data.config);
            });
        },

        async _mergeWithRemote(remoteData) {
            const current = {
                enlevements:   await db.enlevements.toArray(),
                types_dechets: await db.types_dechets.toArray(),
                prestataires:  await db.prestataires.toArray(),
                sites:         await db.sites.toArray(),
                utilisateurs:  await db.utilisateurs.toArray(),
                config:        await db.config.toArray()
            };
            let snapshot;
            try {
                snapshot = this._loadedSnapshot ? JSON.parse(this._loadedSnapshot)
                    : { enlevements: [], types_dechets: [], prestataires: [], sites: [], utilisateurs: [], config: [] };
            } catch {
                snapshot = { enlevements: [], types_dechets: [], prestataires: [], sites: [], utilisateurs: [], config: [] };
            }

            const merged = {
                _meta: remoteData._meta,
                enlevements:   [...(remoteData.enlevements   || [])],
                types_dechets: [...(remoteData.types_dechets || [])],
                prestataires:  [...(remoteData.prestataires  || [])],
                sites:         [...(remoteData.sites         || [])],
                utilisateurs:  [...(remoteData.utilisateurs  || [])],
                config:        [...(remoteData.config        || [])]
            };

            const autoIdStores = new Set(['enlevements', 'types_dechets', 'prestataires', 'sites']);
            const stores = ['enlevements', 'types_dechets', 'prestataires', 'sites', 'utilisateurs', 'config'];

            for (const store of stores) {
                const curArr  = current[store]  || [];
                const snapArr = snapshot[store] || [];
                const remoteById = new Map(merged[store].map(e => [e.id, e]));
                const snapById   = new Map(snapArr.map(e => [e.id, e]));
                const curById    = new Map(curArr.map(e => [e.id, e]));

                const localAdded = [], localUpdated = [], localDeletedIds = [];
                for (const [id, entry] of curById) {
                    const snap = snapById.get(id);
                    if (!snap) localAdded.push(entry);
                    else if (JSON.stringify(snap) !== JSON.stringify(entry)) localUpdated.push(entry);
                }
                for (const id of snapById.keys()) {
                    if (!curById.has(id)) localDeletedIds.push(id);
                }
                for (const id of localDeletedIds) remoteById.delete(id);
                for (const entry of localUpdated) {
                    if (remoteById.has(entry.id)) remoteById.set(entry.id, entry);
                    else localAdded.push(entry);
                }
                let nextId = 1;
                for (const id of remoteById.keys()) {
                    if (typeof id === 'number' && id >= nextId) nextId = id + 1;
                }
                for (const entry of localAdded) {
                    const newEntry = { ...entry };
                    if (autoIdStores.has(store) && remoteById.has(newEntry.id)) {
                        while (remoteById.has(nextId)) nextId++;
                        newEntry.id = nextId++;
                    }
                    remoteById.set(newEntry.id, newEntry);
                }
                merged[store] = Array.from(remoteById.values());
            }
            return merged;
        },

        async _loadFromRemote() {
            try {
                const filePath = `${APP_CONFIG.DATA_FOLDER_PATH}/${APP_CONFIG.DATA_FILE_NAME}`;
                const data = await _readJsonFile(filePath);
                if (!data || !data._meta) return false;
                await this._applyRemoteData(data);
                console.log('DataSync: donnees chargees depuis SharePoint v' + data._meta.version);
                return true;
            } catch (e) {
                console.warn('DataSync: lecture distante impossible', e);
                return false;
            }
        },

        async save() {
            if (this._saving) return;
            if (!this._connected) return;
            this._saving = true;
            const filePath = `${APP_CONFIG.DATA_FOLDER_PATH}/${APP_CONFIG.DATA_FILE_NAME}`;
            const MAX_RETRIES = 3;
            let attempt = 0;

            // Re-tenter l'upload des BL en attente avant la sauvegarde du data.json
            try {
                const pendings = await db.enlevements.toArray();
                for (const e of pendings) {
                    if (!e.bl || !e.bl.pendingUpload || !e.bl.base64) continue;
                    try {
                        const annee = (e.date || '').slice(0, 4) || String(new Date().getFullYear());
                        const prestaSafe = _sanitizeFilenamePart(e.prestataireNom || 'inconnu');
                        const ts = e.createdAt ? Date.parse(e.createdAt) : Date.now();
                        const ext = (e.bl.name && e.bl.name.match(/\.[a-z0-9]+$/i)) ? e.bl.name.match(/\.[a-z0-9]+$/i)[0] : '';
                        const baseSafe = _sanitizeFilenamePart((e.bl.name || 'bl').replace(/\.[^.]+$/, ''));
                        const safeName = ts + '_' + baseSafe + ext;
                        const filePathBL = `${APP_CONFIG.DATA_FOLDER_PATH}/BL/${annee}/${prestaSafe}/${safeName}`;
                        const base64Data = _stripDataUrl(e.bl.base64);
                        const blob = _base64ToBlob(base64Data, e.bl.mimeType);
                        const driveItem = await _uploadBinaryFile(filePathBL, blob, e.bl.mimeType);
                        e.bl = {
                            name: e.bl.name,
                            mimeType: e.bl.mimeType,
                            base64: '',
                            sharepointUrl: driveItem.webUrl || '',
                            sharepointPath: filePathBL,
                            uploadedAt: new Date().toISOString(),
                            pendingUpload: false
                        };
                        await db.enlevements.put(e);
                    } catch (err) {
                        console.warn('Sync BL en attente - echec pour enl ' + e.id, err);
                    }
                }
            } catch (e) { console.warn('Sync BL pending - erreur', e); }

            try {
                while (true) {
                    attempt++;
                    let remoteData = null, remoteETag = null, remoteReadFailed = false;
                    try {
                        const { data, eTag } = await _readJsonFileWithETag(filePath);
                        remoteData = data;
                        remoteETag = eTag;
                    } catch (readErr) {
                        const status = readErr?.status;
                        const isMissing = status === 404;
                        if (!isMissing) remoteReadFailed = true;
                    }

                    if (remoteReadFailed && (this._loadedMeta?.version || 0) > 0) {
                        showToast('Sauvegarde reportee, reessai automatique', 'warning');
                        clearTimeout(this._saveTimer);
                        this._saveTimer = setTimeout(() => this.save(), 5000);
                        return;
                    }

                    const remoteVersion     = remoteData?._meta?.version || 0;
                    const lastSyncedVersion = this._loadedMeta?.version  || 0;
                    let baseVersion = lastSyncedVersion;

                    if (remoteData && remoteVersion > lastSyncedVersion) {
                        const merged = await this._mergeWithRemote(remoteData);
                        await this._writeLocalData(merged);
                        baseVersion = remoteVersion;
                        showToast('Fusion avec donnees distantes', 'info');
                    }

                    const data = await this._collectData();
                    data._meta.version = baseVersion + 1;
                    const writeOpts = {};
                    if (remoteETag) writeOpts.ifMatch = remoteETag;
                    else if (!remoteData) writeOpts.ifNoneMatch = '*';

                    try {
                        await _writeJsonFile(filePath, data, writeOpts);
                    } catch (writeErr) {
                        if (writeErr?.isPreconditionFailed && attempt < MAX_RETRIES) {
                            await new Promise(r => setTimeout(r, 200 + Math.random() * 400));
                            continue;
                        }
                        throw writeErr;
                    }

                    this._loadedMeta = data._meta;
                    this._lastSavedAt = data._meta.lastSaved;
                    this._dirty = false;
                    this._updateBadge(false);
                    await db.config.put({ id: '_syncMeta', value: data._meta });
                    await this._captureSnapshot();
                    ActivityLog.log('sauvegarde', { version: data._meta.version });
                    break;
                }
            } catch (e) {
                console.error('DataSync: erreur sauvegarde', e);
                showToast('Erreur sauvegarde SharePoint (donnees locales conservees)', 'warning');
            } finally {
                this._saving = false;
            }
        },

        markDirty() {
            this._dirty = true;
            this._updateBadge(true);
            if (this._connected) {
                clearTimeout(this._saveTimer);
                this._saveTimer = setTimeout(() => this.save(), APP_CONFIG.SAVE_DEBOUNCE_MS);
            }
        },

        async autoConnect() {
            try {
                await _initMSAL();
                if (_msalAccount) {
                    this._connected = true;
                    await this._loadFromRemote();
                    this.registerPresence();
                    if (_msalInstance._fromRedirect) {
                        showToast('Connecte a SharePoint - ' + (_msalAccount.name || ''));
                    }
                    return 'connected';
                }
                return 'no-handle';
            } catch (e) {
                console.warn('autoConnect echoue', e);
                return 'no-handle';
            }
        },

        async connectFolder() {
            try {
                await _initMSAL();
                if (_isMobile) {
                    await _msalInstance.loginRedirect({ scopes: APP_CONFIG.SCOPES });
                    return false;
                }
                const resp = await _msalInstance.loginPopup({ scopes: APP_CONFIG.SCOPES });
                _msalAccount = resp.account;
                this._connected = true;
                const loaded = await this._loadFromRemote();
                if (!loaded) await this.save();
                this.registerPresence();
                showToast('Connecte a SharePoint - ' + (_msalAccount.name || ''));
                ActivityLog.log('connexion', { compte: _msalAccount.name || '' });
                return true;
            } catch (e) {
                if (e.errorCode === 'user_cancelled') return false;
                console.error('Erreur connexion', e);
                showToast('Erreur de connexion Microsoft', 'danger');
                return false;
            }
        },

        async requestPermission() { return this.connectFolder(); },

        startPolling() {
            if (this._pollTimer) clearInterval(this._pollTimer);
            this._pollTimer = setInterval(async () => {
                if (!this._connected || this._saving) return;
                try {
                    const filePath = `${APP_CONFIG.DATA_FOLDER_PATH}/${APP_CONFIG.DATA_FILE_NAME}`;
                    const data = await _readJsonFile(filePath);
                    if (!data || !data._meta) return;
                    const remoteVersion = data._meta.version || 0;
                    const localVersion  = this._loadedMeta?.version || 0;
                    if (remoteVersion > localVersion) {
                        if (this._isUserEditing()) {
                            this._pendingRemoteData = data;
                            if (!this._pendingNotified) {
                                showToast('Nouvelles donnees - appliquees apres votre saisie', 'info');
                                this._pendingNotified = true;
                            }
                            return;
                        }
                        if (this._dirty) {
                            await this.save();
                            return;
                        }
                        await this._applyRemoteData(data);
                        if (typeof App !== 'undefined' && App.route) App.route();
                        showToast('Donnees mises a jour par ' + (data._meta.savedBy || 'un collegue'), 'info');
                    }
                } catch (e) { /* silent */ }
            }, APP_CONFIG.POLL_INTERVAL_MS);
        },

        async registerPresence() {
            if (!this._connected) return;
            const name = this.getUserName() || 'anonyme';
            const data = { user: name, ts: new Date().toISOString(), tab: Math.random().toString(36).substring(2, 8) };
            const safeName = name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
                .replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') || 'user';
            try {
                await _writeJsonFile(`${APP_CONFIG.PRESENCE_FOLDER}/${safeName}.json`, data);
            } catch { /* ignore */ }
            if (!this._presenceTimer) {
                this._presenceTimer = setInterval(() => this.registerPresence(), APP_CONFIG.PRESENCE_INTERVAL_MS);
            }
        },

        async getActiveUsers() {
            if (!this._connected) return [];
            try {
                const files = await _listFiles(APP_CONFIG.PRESENCE_FOLDER);
                const now = Date.now();
                const users = [];
                for (const f of files) {
                    if (!f.name.endsWith('.json')) continue;
                    try {
                        const content = await _readJsonFile(`${APP_CONFIG.PRESENCE_FOLDER}/${f.name}`);
                        if (!content) continue;
                        if (now - new Date(content.ts).getTime() < APP_CONFIG.PRESENCE_STALE_MS) {
                            users.push(content);
                        }
                    } catch { /* ignore */ }
                }
                const myName = this.getUserName();
                return users.filter(u => u.user !== myName);
            } catch { return []; }
        },

        _isUserEditing() {
            const hash = (location.hash || '').slice(1);
            return hash.startsWith('enlevement-new') || hash.startsWith('enlevement-edit');
        },

        async _applyPendingIfAny() {
            if (!this._pendingRemoteData) return false;
            if (this._isUserEditing()) return false;
            if (this._dirty) {
                this._pendingRemoteData = null;
                this._pendingNotified = false;
                try { await this.save(); } catch (e) {}
                return false;
            }
            const data = this._pendingRemoteData;
            this._pendingRemoteData = null;
            this._pendingNotified = false;
            try {
                await this._applyRemoteData(data);
                showToast('Donnees mises a jour par ' + (data._meta?.savedBy || 'un collegue'), 'info');
                return true;
            } catch { return false; }
        },

        _updateBadge(dirty) {
            const el = document.getElementById('sync-badge');
            if (el) el.style.display = dirty ? 'inline-block' : 'none';
        },

        updateConnectButton(state) {
            const btn = document.getElementById('btn-connect-folder');
            const btnSave = document.getElementById('btn-save-data');
            if (!btn) return;
            if (state === 'connected') {
                btn.className = 'btn btn-sm btn-outline-light';
                btn.innerHTML = '☁️<span class="ms-1">SharePoint</span>';
                btn.title = 'Connecte';
                btn.onclick = null;
                if (btnSave) btnSave.style.display = '';
            } else {
                btn.className = 'btn btn-sm btn-outline-warning';
                btn.innerHTML = '\u{1F517}<span class="ms-1">Connexion</span>';
                btn.onclick = async () => {
                    const ok = await this.connectFolder();
                    if (ok) this.updateConnectButton('connected');
                };
                if (btnSave) btnSave.style.display = 'none';
            }
        },

        _refreshReminder() { /* no-op */ },

        setupBeforeUnload() {
            window.addEventListener('beforeunload', (e) => {
                if (this._dirty) {
                    e.preventDefault();
                    e.returnValue = 'Des modifications non sauvegardees seront perdues';
                }
            });
        },

        showConnectReminder() {
            const bar = document.getElementById('permission-bar');
            if (!bar) return;
            bar.innerHTML = `
                <div class="alert alert-info alert-dismissible d-flex align-items-center m-2" role="alert">
                    \u{1F517}
                    <div class="flex-grow-1 ms-2">Mode hors-ligne - connectez-vous a SharePoint pour synchroniser.</div>
                    <button class="btn btn-sm btn-primary ms-2" id="btn-connect-reminder">Connexion</button>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
            bar.querySelector('#btn-connect-reminder').onclick = async () => {
                const ok = await this.connectFolder();
                if (ok) { bar.innerHTML = ''; this.updateConnectButton('connected'); }
            };
        },

        _updatePresenceBanner(others) {
            if (!others || !others.length) return;
            const names = others.map(u => u.user).join(', ');
            showToast('Autres utilisateurs en ligne : ' + names, 'info');
        }
    };
    </script>

    <!-- ============================================================= -->
    <!-- HELPERS (format, options)                                     -->
    <!-- ============================================================= -->
    <script>
    const Helpers = {
        formatDateFR(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr + (dateStr.length === 10 ? 'T12:00:00' : ''));
            if (isNaN(d)) return dateStr;
            return d.toLocaleDateString('fr-FR');
        },
        todayISO() {
            const d = new Date();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const j = String(d.getDate()).padStart(2, '0');
            return `${d.getFullYear()}-${m}-${j}`;
        },
        esc(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        },
        async compressPhoto(file, maxWidth = 1200, quality = 0.7) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;
                        if (width > maxWidth) {
                            height = Math.round(height * maxWidth / width);
                            width = maxWidth;
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
    };

    const UNITES   = ['kg', 't', 'm3', 'litres'];
    const CONTENANTS = ['benne', 'bigbag', 'fut', 'GRV', 'palette', 'autre'];
    const MODES_TRAITEMENT = [
        { code: 'R1',  label: 'R1 - Combustible / production energie' },
        { code: 'R3',  label: 'R3 - Recyclage matieres organiques' },
        { code: 'R4',  label: 'R4 - Recyclage metaux' },
        { code: 'R5',  label: 'R5 - Recyclage autres matieres inorganiques' },
        { code: 'R12', label: 'R12 - Echange de dechets en vue de R1-R11' },
        { code: 'R13', label: 'R13 - Stockage transitoire avant valorisation' },
        { code: 'D1',  label: 'D1 - Depot sur ou dans le sol' },
        { code: 'D5',  label: 'D5 - Mise en decharge specialement amenagee' },
        { code: 'D9',  label: 'D9 - Traitement physico-chimique' },
        { code: 'D10', label: 'D10 - Incineration a terre' },
        { code: 'D13', label: 'D13 - Regroupement avant elimination' },
        { code: 'D15', label: 'D15 - Stockage transitoire avant elimination' }
    ];

    function tonnesEquiv(quantite, unite) {
        const q = Number(quantite) || 0;
        switch (unite) {
            case 't':      return q;
            case 'kg':     return q / 1000;
            case 'litres': return q / 1000; // approximation ~1kg/litre
            case 'm3':     return q;        // approximation ~1t/m3
            default:       return q / 1000;
        }
    }
    </script>

    <script>
    const DashboardPage = {
        async render(container) {
            const enlevements = await DB.listEnlevements();
            const types       = await DB.listTypesDechets();
            const sites       = await DB.listSites();

            const now = new Date();
            const moisCourant = now.getMonth();
            const anneeCourante = now.getFullYear();

            const enlMois = enlevements.filter(e => {
                const d = new Date(e.date + 'T12:00:00');
                return d.getMonth() === moisCourant && d.getFullYear() === anneeCourante;
            });
            const enlAnnee = enlevements.filter(e => {
                const d = new Date(e.date + 'T12:00:00');
                return d.getFullYear() === anneeCourante;
            });

            let tonnesDang = 0, tonnesNonDang = 0, nbBsd = 0;
            for (const e of enlAnnee) {
                const t = tonnesEquiv(e.quantite, e.unite);
                if (e.dangereux) tonnesDang += t; else tonnesNonDang += t;
                if (e.numeroBsd) nbBsd++;
            }

            const nbTdMois = enlMois.filter(e => e.source === 'trackdechets').length;

            // Top types
            const topTypes = {};
            for (const e of enlAnnee) {
                const k = e.typeDechetDesignation || 'Non specifie';
                topTypes[k] = (topTypes[k] || 0) + tonnesEquiv(e.quantite, e.unite);
            }
            const topTypesArr = Object.entries(topTypes).sort((a, b) => b[1] - a[1]).slice(0, 5);

            // Top sites
            const topSites = {};
            for (const e of enlAnnee) {
                const k = e.siteNom || 'Non specifie';
                topSites[k] = (topSites[k] || 0) + tonnesEquiv(e.quantite, e.unite);
            }
            const topSitesArr = Object.entries(topSites).sort((a, b) => b[1] - a[1]).slice(0, 5);

            // Tonnage mensuel 12 mois
            const months = [];
            for (let i = 11; i >= 0; i--) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                months.push({
                    label: d.toLocaleDateString('fr-FR', { month: 'short', year: '2-digit' }),
                    year: d.getFullYear(),
                    month: d.getMonth(),
                    tonnes: 0
                });
            }
            for (const e of enlevements) {
                const d = new Date(e.date + 'T12:00:00');
                const m = months.find(mm => mm.year === d.getFullYear() && mm.month === d.getMonth());
                if (m) m.tonnes += tonnesEquiv(e.quantite, e.unite);
            }

            // Repartition par type (pie)
            const repartitionType = topTypesArr.slice(0, 8);

            container.innerHTML = `
                <div class="container">
                    <h2 class="mb-3"><span>&#x1F4CA;</span> Tableau de bord <small class="text-muted fs-6">${anneeCourante}</small></h2>

                    <div class="row g-3 mb-4">
                        <div class="col-md-3 col-6">
                            <div class="kpi-card">
                                <div class="kpi-value">${enlMois.length}</div>
                                <div class="kpi-label">Enlevements ce mois</div>
                            </div>
                        </div>
                        <div class="col-md-3 col-6">
                            <div class="kpi-card">
                                <div class="kpi-value">${enlAnnee.length}</div>
                                <div class="kpi-label">Enlevements ${anneeCourante}</div>
                            </div>
                        </div>
                        <div class="col-md-3 col-6">
                            <div class="kpi-card" style="border-left-color:#dc3545">
                                <div class="kpi-value" style="color:#dc3545">${tonnesDang.toFixed(2)} t</div>
                                <div class="kpi-label">Dechets dangereux</div>
                            </div>
                        </div>
                        <div class="col-md-3 col-6">
                            <div class="kpi-card">
                                <div class="kpi-value">${tonnesNonDang.toFixed(2)} t</div>
                                <div class="kpi-label">Dechets non dangereux</div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-3 col-6">
                            <div class="kpi-card" style="border-left-color:#0d6efd">
                                <div class="kpi-value" style="color:#0d6efd">${nbBsd}</div>
                                <div class="kpi-label">BSD / Bons d'enlèvement ${anneeCourante}</div>
                            </div>
                        </div>
                        <div class="col-md-3 col-6">
                            <div class="kpi-card">
                                <div class="kpi-value">${(tonnesDang + tonnesNonDang).toFixed(2)} t</div>
                                <div class="kpi-label">Tonnage total ${anneeCourante}</div>
                            </div>
                        </div>
                        <div class="col-md-3 col-6">
                            <div class="kpi-card" style="border-left-color:var(--agw-green)">
                                <div class="kpi-value">${nbTdMois}</div>
                                <div class="kpi-label">Importes Trackdechets ce mois</div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-lg-6">
                            <div class="card">
                                <div class="card-header">Tonnage mensuel (12 mois)</div>
                                <div class="card-body"><canvas id="chart-monthly" height="200"></canvas></div>
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="card">
                                <div class="card-header">Repartition par type de dechet (t)</div>
                                <div class="card-body"><canvas id="chart-type" height="200"></canvas></div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-lg-6">
                            <div class="card">
                                <div class="card-header">Top 5 sites producteurs ${anneeCourante}</div>
                                <div class="card-body">
                                    ${topSitesArr.length === 0 ? '<p class="text-muted m-0">Aucune donnee.</p>' :
                                        '<table class="table table-sm mb-0"><tbody>' +
                                        topSitesArr.map(([nom, t]) =>
                                            `<tr><td>${Helpers.esc(nom)}</td><td class="text-end fw-bold">${t.toFixed(2)} t</td></tr>`
                                        ).join('') + '</tbody></table>'}
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-6">
                            <div class="card">
                                <div class="card-header">Top 5 types de dechets ${anneeCourante}</div>
                                <div class="card-body">
                                    ${topTypesArr.length === 0 ? '<p class="text-muted m-0">Aucune donnee.</p>' :
                                        '<table class="table table-sm mb-0"><tbody>' +
                                        topTypesArr.map(([nom, t]) =>
                                            `<tr><td>${Helpers.esc(nom)}</td><td class="text-end fw-bold">${t.toFixed(2)} t</td></tr>`
                                        ).join('') + '</tbody></table>'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;

            // Charts
            const ctxMonth = document.getElementById('chart-monthly');
            if (ctxMonth) {
                new Chart(ctxMonth, {
                    type: 'bar',
                    data: {
                        labels: months.map(m => m.label),
                        datasets: [{
                            label: 'Tonnes',
                            data: months.map(m => +m.tonnes.toFixed(2)),
                            backgroundColor: '#00693e'
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } } }
                });
            }

            const ctxType = document.getElementById('chart-type');
            if (ctxType && repartitionType.length > 0) {
                new Chart(ctxType, {
                    type: 'doughnut',
                    data: {
                        labels: repartitionType.map(([n]) => n.length > 40 ? n.slice(0, 37) + '...' : n),
                        datasets: [{
                            data: repartitionType.map(([, v]) => +v.toFixed(2)),
                            backgroundColor: ['#00693e', '#2a9d6c', '#5cb85c', '#f0ad4e', '#d9534f', '#5bc0de', '#9b59b6', '#34495e']
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
                });
            }
        }
    };
    </script>

                            </div>
                            <div class="col-md-3 col-6">
                                <label class="form-label small">Type dechet</label>
                                <select id="f-type" class="form-select form-select-sm">
                                    <option value="">Tous</option>

                                <label class="form-label small">Prestataire</label>
                                <select id="f-prest" class="form-select form-select-sm">
                                    <option value="">Tous</option>

                const type  = document.getElementById('f-type').value;
                const prest = document.getElementById('f-prest').value;
                const dest  = document.getElementById('f-dest').value;
                const trait = document.getElementById('f-trait').value;
                const dang  = document.getElementById('f-dang').checked;

                let filtered = enlevements.slice();
                if (debut) filtered = filtered.filter(e => e.date >= debut);
                if (fin)   filtered = filtered.filter(e => e.date <= fin);
                if (site)  filtered = filtered.filter(e => String(e.siteId) === site);
                if (type)  filtered = filtered.filter(e => String(e.typeDechetId) === type);
                if (prest) filtered = filtered.filter(e => String(e.prestataireId) === prest);
                if (dest)  filtered = filtered.filter(e => (e.destinationNom||'').trim() === dest);
                if (trait) filtered = filtered.filter(e => (e.modeTraitement||'').trim().toUpperCase().startsWith(trait));
                if (dang)  filtered = filtered.filter(e => e.dangereux === true);
                lastFiltered = filtered;

                        const mt = (e.modeTraitement || '').trim().toUpperCase();
                        const traitClass = mt.startsWith('R') ? 'badge-trait-r' : (mt.startsWith('D') ? 'badge-trait-d' : '');

                            <td>${Helpers.formatDateFR(e.date)}</td>
                            <td>${Helpers.esc(e.siteNom || '')}</td>
                            <td>
                                <span class="badge-low">${Helpers.esc(e.codeLow || '')}</span>
                                ${e.dangereux ? '<span class="badge-danger-dechet ms-1">DANGEREUX</span>' : ''}
                                <div class="small text-muted">${Helpers.esc(e.typeDechetDesignation || '')}</div>

                            <td class="text-end fw-bold">${Helpers.esc(e.quantite)} ${Helpers.esc(e.unite || 'kg')}</td>
                            <td>${Helpers.esc(e.prestataireNom || '')}</td>
                            <td>${destCell}</td>
                            <td class="text-center">${traitBadge}</td>
                            <td>
                                ${Helpers.esc(e.numeroBsd || '-')}
                                ${e.source === 'trackdechets' ? '<span class="badge-trackdechets" title="Importe depuis Trackdechets">TD</span>' : ''}

                                <button class="btn btn-sm btn-outline-danger" data-del="${e.id}" title="Supprimer">&#x1F5D1;&#xFE0F;</button>
                            </td>
                        </tr>`;
                    }).join('');
                }
                document.getElementById('enl-count').textContent = filtered.length;
            };

            ['f-debut','f-fin','f-site','f-type','f-prest','f-dest','f-trait','f-dang'].forEach(id => {
                document.getElementById(id).addEventListener('change', refresh);
            });

            document.getElementById('f-reset').addEventListener('click', () => {
                ['f-debut','f-fin'].forEach(id => document.getElementById(id).value = '');
                ['f-site','f-type','f-prest','f-dest','f-trait'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('f-dang').checked = false;
                refresh();
            });

            container.addEventListener('click', async (e) => {
                const delId = e.target.closest('[data-del]')?.dataset.del;
                if (delId) {
                    if (confirm('Supprimer cet enlevement ?')) {
                        await DB.deleteEnlevement(delId);
                        ActivityLog.log('suppression_enlevement', { id: delId });
                        if (typeof DataSync !== 'undefined') DataSync.markDirty();
                        showToast('Enlevement supprime');
                        App.route();
                    }
                    return;
                }
                const pdfId = e.target.closest('[data-pdf]')?.dataset.pdf;
                if (pdfId) {
                    await PdfExport.generate(pdfId);
                }
            });

            document.getElementById('btn-export-registre').addEventListener('click', () => {
                ExcelExport.registre(lastFiltered);
            });

            refresh();
        }
    };
    </script>
